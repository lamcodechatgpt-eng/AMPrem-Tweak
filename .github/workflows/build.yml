name: Build AMPrem Tweak

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  patch-binary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Patch binary
        run: |
          # Bỏ qua patch_full_premium.py vì gây crash (ghi đè offset +0x38).
          # Tweak.m (dylib) đã xử lý việc bẻ khoá an toàn.
          cp binary/AlightMotion binary/AlightMotion_patched 2>/dev/null || true
          echo "Binary kept original. Tweak.m will handle the patches."

      - name: Upload patched binary
        uses: actions/upload-artifact@v4
        with:
          name: AlightMotion-Patched
          path: binary/AlightMotion_patched

  build-dylib:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build dylib with clang
        run: |
          SYSROOT=$(xcrun --sdk iphoneos --show-sdk-path)
          cd TweakSource
          clang -arch arm64 -isysroot $SYSROOT -dynamiclib -fobjc-arc \
            -framework Foundation -framework StoreKit -framework UIKit \
            Tweak.m -o AMPrem.dylib 2>&1 | tee build_log.txt

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: AMPrem-Dylib
          path: TweakSource/AMPrem.dylib

  inject-and-repack:
    runs-on: macos-latest
    needs: [patch-binary, build-dylib]
    steps:
      - uses: actions/checkout@v4

      - name: Download patched binary
        uses: actions/download-artifact@v4
        with:
          name: AlightMotion-Patched
          path: .

      - name: Download dylib
        uses: actions/download-artifact@v4
        with:
          name: AMPrem-Dylib
          path: .

      - name: Inject dylib with insert_dylib
        run: |
          # Get insert_dylib
          curl -L -o /tmp/insert_dylib https://github.com/Tyilo/insert_dylib/releases/latest/download/insert_dylib
          chmod +x /tmp/insert_dylib

          # Rename to AlightMotion first
          mv AlightMotion_patched AlightMotion_injected 2>/dev/null || true

          # Inject
          /tmp/insert_dylib --inplace --all-yes "@rpath/AMPrem.dylib" AlightMotion_injected

          echo "=== Verification ==="
          otool -L AlightMotion_injected | grep AMPrem
          echo "ncmds increased by 1:"
          otool -l AlightMotion_injected | grep -c "LC_LOAD_DYLIB"

      - name: Upload injected binary
        uses: actions/upload-artifact@v4
        with:
          name: AlightMotion-Injected
          path: AlightMotion_injected

  build-deb:
    runs-on: macos-latest
    needs: build-dylib
    steps:
      - uses: actions/checkout@v4

      - name: Download dylib
        uses: actions/download-artifact@v4
        with:
          name: AMPrem-Dylib
          path: TweakSource

      - name: Prepare DEB package
        run: |
          mkdir -p package/Library/MobileSubstrate/DynamicLibraries
          cp TweakSource/AMPrem.dylib package/Library/MobileSubstrate/DynamicLibraries/
          cp TweakSource/AMPrem.plist package/Library/MobileSubstrate/DynamicLibraries/
          cp TweakSource/control package/DEBIAN/
          chmod 0755 package/DEBIAN
          dpkg-deb -Zgzip -b package AMPrem.deb

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: AMPrem-DEB
          path: AMPrem.deb
