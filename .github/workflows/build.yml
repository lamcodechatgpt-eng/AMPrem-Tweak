name: Build AMPrem Tweak

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  validate-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate patcher scripts
        run: |
          python -c "import scripts.patch_full_premium; print('patcher OK')"
          python -c "import scripts.rename_ultra_motion; print('rename OK')"
          python -c "import scripts.binary_patch_option_a; print('binary_patch OK')"
      - name: Validate MITM script
        run: |
          node -c alightmotion-mitm.js && echo "MITM JS OK"

  build-dylib:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build dylib with clang
        run: |
          SYSROOT=$(xcrun --sdk iphoneos --show-sdk-path)
          cd TweakSource
          clang -arch arm64 -isysroot $SYSROOT -dynamiclib -fobjc-arc \
            -framework Foundation -framework StoreKit -framework UIKit \
            Tweak.m -o AMPrem.dylib 2>&1 | tee build_log.txt

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: AMPrem-Dylib
          path: TweakSource/AMPrem.dylib

  build-deb:
    runs-on: macos-latest
    needs: build-dylib
    steps:
      - uses: actions/checkout@v4

      - name: Download dylib
        uses: actions/download-artifact@v4
        with:
          name: AMPrem-Dylib
          path: TweakSource

      - name: Prepare DEB package
        run: |
          mkdir -p package/Library/MobileSubstrate/DynamicLibraries
          cp TweakSource/AMPrem.dylib package/Library/MobileSubstrate/DynamicLibraries/
          cp TweakSource/AMPrem.plist package/Library/MobileSubstrate/DynamicLibraries/
          cp TweakSource/control package/DEBIAN/
          chmod 0755 package/DEBIAN
          dpkg-deb -Zgzip -b package AMPrem.deb

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: AMPrem-DEB
          path: AMPrem.deb
